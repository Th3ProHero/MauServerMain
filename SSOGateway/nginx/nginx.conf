worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Optimization: Disable access logs for performance, or log only errors
    access_log off;
    error_log /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Map Referer to Backend IP/Port for asset requests
    map $http_referer $asset_backend {
        ~*/localgpt/     http://192.168.0.220:8084;
        ~*/dashboard/    http://192.168.0.220:9091;
        ~*/portainer/    http://192.168.0.220:9000;
        ~*/netdata/      http://192.168.0.220:19999;
        ~*/audiospace/   http://192.168.0.220:8082;
        default          http://webapp:3000;
    }

    server {
        listen 8085;
        server_name _;

        # ----------------------------------------------------
        # 1. The Auth Request Verification Endpoint
        # ----------------------------------------------------
        location = /api/auth/verify {
            internal;
            proxy_pass http://webapp:3000/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Host $http_host;
        }

        # ----------------------------------------------------
        # 2. Next.js Public Routes (Login, _next static files)
        # ----------------------------------------------------
        # We don't apply auth_request here to allow users to login
        location /login {
            proxy_pass http://webapp:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /_next/ {
            proxy_pass http://webapp:3000;
            proxy_set_header Host $host;
            access_log off;
        }

        location /api/auth/ {
            proxy_pass http://webapp:3000;
            proxy_set_header Host $host;
        }

        # ----------------------------------------------------
        # 3. Next.js Dashboard (Root)
        # ----------------------------------------------------
        location = / {
            # Let Next.js handle auth natively via middleware, or protect it here
            proxy_pass http://webapp:3000;
            proxy_set_header Host $host;
        }

        # ----------------------------------------------------
        # 4. Protected Internal Services (Strips Path)
        # ----------------------------------------------------
        
        # Helper: If auth fails, redirect to /login
        error_page 401 = @error401;
        location @error401 {
            return 302 /login;
        }

        # --- LocalGPT ---
        location /localgpt/ {
            auth_request /api/auth/verify;
            proxy_pass http://192.168.0.220:8084/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- Dashboard Ubuntu ---
        location /dashboard/ {
            auth_request /api/auth/verify;
            proxy_pass http://192.168.0.220:9091/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- Portainer ---
        location /portainer/ {
            auth_request /api/auth/verify;
            proxy_pass http://192.168.0.220:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- Netdata ---
        location /netdata/ {
            auth_request /api/auth/verify;
            proxy_pass http://192.168.0.220:19999/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- AudioSpace Control ---
        location /audiospace/ {
            auth_request /api/auth/verify;
            proxy_pass http://192.168.0.220:8082/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ----------------------------------------------------
        # 5. Magic Asset Routing (The Fix for Blank Pages)
        # ----------------------------------------------------
        # Many apps ask for /assets or /_next directly. This catches those
        # requests and routes them to the correct backend based on the Referer.
        location ~ ^/(_next|assets|static|css|js|images|fonts|public|api|favicon\.ico)/? {
            proxy_pass $asset_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Catch-all without trailing slashes (Redirect to slash)
        location = /localgpt { return 301 /localgpt/; }
        location = /dashboard { return 301 /dashboard/; }
        location = /portainer { return 301 /portainer/; }
        location = /netdata { return 301 /netdata/; }
        location = /audiospace { return 301 /audiospace/; }
    }
}
